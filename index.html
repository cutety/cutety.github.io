s="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;stdlib.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;malloc.h&gt; </span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;memory.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> MAXSIZE 100</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> LIST_INCREMENT 10</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> LIST_INIT_SIZE 50</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> TRUE 1</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> FLASE 0</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> OK 1</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> ERROR 0</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> INFEASIBLE -1</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> OVERFLOW -2</span></span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">int</span> Status;</span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">int</span> <span class="keyword">bool</span>; </span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">int</span> ElemType;</span><br><span class="line"><span class="keyword">typedef</span> <span class="class"><span class="keyword">struct</span> &#123;</span></span><br><span class="line">	ElemType *elem;</span><br><span class="line">	<span class="keyword">int</span> length;</span><br><span class="line">	<span class="keyword">int</span> listsize;</span><br><span class="line">&#125;SeqList;</span><br><span class="line"><span class="function">Status <span class="title">InitList</span><span class="params">(SeqList* L)</span> </span>&#123;</span><br><span class="line">	L-&gt;elem=(ElemType *)<span class="built_in">malloc</span>(LIST_INIT_SIZE * <span class="keyword">sizeof</span> (ElemType));</span><br><span class="line">	<span class="keyword">if</span>(!L-&gt;elem)</span><br><span class="line">	<span class="built_in">exit</span>(OVERFLOW);</span><br><span class="line">	<span class="built_in">memset</span>(L-&gt;elem,<span class="number">0</span>,LIST_INIT_SIZE * <span class="keyword">sizeof</span>(ElemType));</span><br><span class="line">	L-&gt;length=<span class="number">0</span>;</span><br><span class="line">	L-&gt;listsize=LIST_INIT_SIZE;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function">Status <span class="title">InsertList</span><span class="params">(SeqList *L,<span class="keyword">int</span> i,<span class="keyword">const</span> ElemType e)</span></span>&#123;</span><br><span class="line">	ElemType * new_elem = <span class="literal">NULL</span>;</span><br><span class="line">	<span class="keyword">int</span> ins=<span class="number">0</span>;</span><br><span class="line">	<span class="keyword">if</span>(i&lt;<span class="number">1</span>||i&gt;L-&gt;length+<span class="number">1</span>)&#123;</span><br><span class="line">		<span class="keyword">return</span> ERROR;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">if</span>(L-&gt;length&gt;=L-&gt;listsize)&#123;</span><br><span class="line">		new_elem=(ElemType *)<span class="built_in">realloc</span>(L-&gt;elem,(L-&gt;listsize+LIST_INCREMENT)*<span class="keyword">sizeof</span>(ElemType));</span><br><span class="line">		<span class="keyword">if</span>(!new_elem)</span><br><span class="line">		<span class="built_in">exit</span>(OVERFLOW);</span><br><span class="line">		L-&gt;listsize+=LIST_INCREMENT;</span><br><span class="line">		L-&gt;elem=new_elem;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">for</span>(ins=L-&gt;length<span class="number">-1</span>;ins&gt;=i<span class="number">-1</span>;ins--)&#123;</span><br><span class="line">		L-&gt;elem[ins+<span class="number">1</span>]=L-&gt;elem[ins];</span><br><span class="line">	&#125;</span><br><span class="line">	L-&gt;elem[i<span class="number">-1</span>]=e;</span><br><span class="line">	L-&gt;length++;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">print</span><span class="params">(<span class="keyword">const</span> SeqList L)</span></span>&#123;</span><br><span class="line">	<span class="keyword">int</span> i=<span class="number">0</span>;</span><br><span class="line">	<span class="keyword">if</span>(!L.elem)</span><br><span class="line">	<span class="built_in">exit</span>(INFEASIBLE);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">"print start\n"</span>);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">"elemAddr[%d],length[%d],mallocsize[%d]\n"</span>,L.elem,L.length,L.listsize);</span><br><span class="line">	<span class="keyword">for</span>(i=<span class="number">0</span>;i&lt;L.length;i++)&#123;</span><br><span class="line">		<span class="built_in">printf</span>(<span class="string">"elem[%d],value[%d]\n"</span>,i+<span class="number">1</span>,L.elem[i]);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">"end\n"</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">	SeqList <span class="built_in">list</span>;</span><br><span class="line">	ElemType elem_;</span><br><span class="line">	ElemType preElem;</span><br><span class="line">	ElemType nextElem;</span><br><span class="line">	<span class="keyword">int</span> i=<span class="number">0</span>;</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">"start\n"</span>);</span><br><span class="line">	InitList(&amp;<span class="built_in">list</span>);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">"inited...\n"</span>);</span><br><span class="line">	<span class="keyword">for</span>(i=<span class="number">1</span>;i&lt;<span class="number">100</span>;i++)&#123;</span><br><span class="line">		InsertList(&amp;<span class="built_in">list</span>,i<span class="number">-1</span>,i<span class="number">-1</span>);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">"inserted\n"</span>);</span><br><span class="line">	print(<span cl
