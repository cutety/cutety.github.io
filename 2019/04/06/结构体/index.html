        <h1 id="结构体中-与-gt-的区别"><a href="#结构体中-与-gt-的区别" class="headerlink" title=" 结构体中 (.) 与 (-&gt;)的区别"></a><center> 结构体中 (.) 与 (-&gt;)的区别</center></h1><h3 id="举个例子"><a href="#举个例子" class="headerlink" title="举个例子"></a>举个例子</h3><p>定义如下的结构体：</p>

<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">typedef</span> <span class="keyword">int</span> ElemType;</span><br><span class="line"><span class="keyword">typedef</span> <span class="class"><span class="keyword">struct</span>&#123;</span></span><br><span class="line">	ElemType *elem;</span><br><span class="line">	<span class="keyword">int</span> length;</span><br><span class="line">	<span class="keyword">int</span> listsize;</span><br><span class="line">&#125;SeqList;</span><br><span class="line">SeqList <span class="built_in">list</span>;</span><br><span class="line">SeqList *plist;</span><br></pre></td></tr></table></figure>
<p>(.)左边是结果为<strong>结构的表达式</strong>，右边是成员的名称</p>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">list</span>.elem=<span class="number">1</span>;</span><br></pre></td></tr></table></figure>
<p>(-&gt;)左边是指向结构体的指针，右边是成员的名称</p>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">plist-&gt;elem=<span class="number">1</span>;</span><br></pre></td></tr></table></figure>
<p>实际上，这两个意思是一样的。</p>
